<!DOCTYPE html>
<html>
<head>
<title>Kerala Election Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background:#f4f6fb;
    margin:0;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
}

.header h1 {
    font-size:24px;
}

.header h2 {
    color:#1f5ca8;
}

.underline {
    width:120px;
    height:4px;
    background:green;
    margin:auto;
}

/* PARTY CARDS */
.cards {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin:20px;
}

.card {
    width:150px;
    padding:20px;
    border-radius:10px;
    color:white;
    text-align:center;
    font-weight:bold;
}

.inc { background:#2fa4d6; }
.cpim { background:#ff1a1a; }
.iuml { background:green; }
.cpi { background:#e60023; }
.kec { background:#d870d6; }
.rsp { background:#4b2e83; }
.other { background:#9c9c6b; }

/* MAIN GRID */
.container {
    display:flex;
    gap:20px;
    margin:20px;
}

/* TABLE */
.box {
    flex:1;
    background:white;
    border-radius:8px;
    overflow:hidden;
}

.box-header {
    background:#b5a7d6;
    padding:10px;
    font-weight:bold;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}

th {
    text-align:left;
}

/* MAP SECTION */
.map-box {
    flex:1;
    background:white;
    border-radius:8px;
}

.map-header {
    background:#b5a7d6;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

select {
    padding:5px;
}

/* STATUS */
#status {
    text-align:center;
    margin:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>General Election to Assembly Constituencies: Trends & Results May-2026</h1>
    <h2>Kerala (Total AC : 140)</h2>
    <div class="underline"></div>
</div>

<!-- STATUS -->
<div id="status">Loading...</div>

<!-- PARTY CARDS -->
<div class="cards" id="cards"></div>

<!-- MAIN SECTION -->
<div class="container">

    <!-- TABLE -->
    <div class="box">
        <div class="box-header">Party Wise Results</div>

        <table>
            <thead>
                <tr>
                    <th>Party</th>
                    <th>Won</th>
                    <th>Leading</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tableData"></tbody>
        </table>
    </div>

    <!-- MAP -->
    <div class="map-box">
        <div class="map-header">
            <span>Constituency Wise Results</span>

            <select id="constituencySelect" onchange="goToConstituency()">
                <option>Select Constituency</option>
            </select>
        </div>

        <div style="padding:20px; text-align:center;">
            <p>🗺️ Kerala Map (Add later)</p>
        </div>
    </div>

</div>

<script>

// LOAD DATA
async function load(){
    let res = await fetch("/api/party-summary");
    let json = await res.json();

    let cards = document.getElementById("cards");
    let table = document.getElementById("tableData");
    let status = document.getElementById("status");

    cards.innerHTML = "";
    table.innerHTML = "";

    if(!json.data || json.data.length === 0){
        status.innerText = "No Data";
        return;
    }

    status.innerText = json.dummy ? "Dummy Data" : "Live Data";

    json.data.forEach(p=>{

        let cls = "other";

        if(p.Party.includes("INC")) cls="inc";
        else if(p.Party.includes("CPIM")) cls="cpim";
        else if(p.Party.includes("IUML")) cls="iuml";
        else if(p.Party.includes("CPI")) cls="cpi";
        else if(p.Party.includes("KEC")) cls="kec";
        else if(p.Party.includes("RSP")) cls="rsp";

        // CARDS
        cards.innerHTML += `
        <div class="card ${cls}">
            ${p.Party}
            <h1>${p.Total}</h1>
        </div>
        `;

        // TABLE
        table.innerHTML += `
        <tr>
            <td>${p.Party}</td>
            <td>${p.Won}</td>
            <td style="color:blue;">${p.Leading}</td>
            <td>${p.Total}</td>
        </tr>
        `;
    });
}


// LOAD CONSTITUENCIES
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let select = document.getElementById("constituencySelect");

    json.data.forEach(c=>{
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}


// NAVIGATION
function goToConstituency(){
    let name = document.getElementById("constituencySelect").value;

    if(name){
        window.location = "/constituency/" + encodeURIComponent(name);
    }
}


// AUTO REFRESH
setInterval(load, 10000);

// INIT
load();
loadConstituencies();

</script>

</body>
</html>
