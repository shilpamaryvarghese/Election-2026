<!DOCTYPE html>
<html>
<head>
<title>Election Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }

.container { display:flex; height:100vh; }

#map { width:60%; }

.sidebar {
    width:40%;
    padding:20px;
    background:#f4f6fb;
    overflow:auto;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
}

.card {
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

    <div id="map"></div>

    <div class="sidebar">

        <h2>Search</h2>

        <input id="searchBox" placeholder="Search constituency...">

        <select id="constituencySelect" onchange="loadConstituencyData()">
            <option value="">Select Constituency</option>
        </select>

        <div id="results"></div>

    </div>

</div>

<script>

// INIT MAP
let map = L.map('map').setView([10.2, 76.3], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);


// CLEAN FUNCTION (IMPORTANT FIX)
function clean(text){
    return text.toLowerCase().replace(/\s+/g,'').trim();
}


// ALLIANCE
function getAlliance(party){
    party = (party || "").toUpperCase();

    if(["INC","IUML"].includes(party)) return "UDF";
    if(["CPIM","CPI"].includes(party)) return "LDF";
    if(["BJP"].includes(party)) return "NDA";

    return "Others";
}


// COLOR
function getColor(a){
    if(a==="UDF") return "#1e90ff";
    if(a==="LDF") return "#e74c3c";
    if(a==="NDA") return "#f39c12";
    return "#ccc";
}


let geoLayer;


// LOAD MAP (FULL FIXED)
async function loadMap(){

    if(geoLayer){
        map.removeLayer(geoLayer);
    }

    let geo = await fetch("/static/kerala.geojson").then(r=>r.json());

    let api = await fetch("https://api.opendatakerala.org/api/kla2026/results/all.json")
                .then(r=>r.json());

    geoLayer = L.geoJSON(geo, {

        style: function(feature){

            let name = feature.properties.AC_NAME || feature.properties.name;

            let candidates = api.filter(d =>
                clean(d.constituency) === clean(name)
            );

            let winner = candidates.find(c => c.status.toLowerCase() === "won");

            let alliance = "Others";

            if(winner){
                alliance = getAlliance(winner.party);
            } else {
                let lead = candidates.find(c => c.status.toLowerCase() === "leading");
                if(lead) alliance = getAlliance(lead.party);
            }

            return {
                fillColor: getColor(alliance),
                weight:1,
                color:"#333",
                fillOpacity:0.8
            };
        },

        onEachFeature: function(feature, layer){

            let name = feature.properties.AC_NAME || feature.properties.name;

            let candidates = api.filter(d =>
                clean(d.constituency) === clean(name)
            );

            let winner = candidates.find(c => c.status.toLowerCase() === "won") || candidates[0];

            if(winner){
                layer.bindPopup(`
                    <b>${name}</b><br>
                    ${winner.candidate}<br>
                    ${winner.party}<br>
                    Votes: ${winner.votes}<br>
                    Status: ${winner.status}
                `);
            }

            layer.on("click", function(){
                document.getElementById("constituencySelect").value = name;
                loadConstituencyData();
            });
        }

    }).addTo(map);

    map.fitBounds(geoLayer.getBounds());  // 🔥 IMPORTANT
}

loadMap();


// LOAD DROPDOWN
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let select = document.getElementById("constituencySelect");

    json.data.forEach(c=>{
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}
loadConstituencies();


// LOAD RESULTS
async function loadConstituencyData(){
    let name = document.getElementById("constituencySelect").value;
    if(!name) return;

    let res = await fetch("/api/constituency/" + encodeURIComponent(name));
    let json = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "";

    json.data.forEach(r=>{
        div.innerHTML += `
        <div class="card">
            <b>${r.Candidate_Name}</b><br>
            ${r.Party}<br>
            Votes: ${r.votes}<br>
            Status: ${r.status}
        </div>
        `;
    });
}


// SEARCH
document.getElementById("searchBox").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();

    let options = document.querySelectorAll("#constituencySelect option");

    options.forEach(o=>{
        if(o.value.toLowerCase().includes(val)){
            o.style.display = "block";
        } else {
            o.style.display = "none";
        }
    });
});


// AUTO REFRESH
setInterval(loadMap, 15000);

</script>

</body>
</html>
