<!DOCTYPE html>
<html>
<head>
<title>Election Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

.container {
    display:flex;
    height:100vh;
}

/* LEFT MAP */
#map {
    width:60%;
    height:100%;
}

/* RIGHT PANEL */
.sidebar {
    width:40%;
    padding:20px;
    overflow:auto;
    background:#f4f6fb;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
}

.card {
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

    <!-- MAP -->
    <div id="map"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Search</h2>

        <input type="text" id="searchBox" placeholder="Search constituency or candidate...">

        <select id="constituencySelect" onchange="loadConstituencyData()">
            <option value="">Select Constituency</option>
        </select>

        <div id="results"></div>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.5, 76.2], 7);

// BASE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// LOAD GEOJSON
fetch("/static/kerala.geojson")
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        style: {
            color: "#333",
            weight: 1,
            fillColor: "#ccc"
        },
        onEachFeature: function(feature, layer){
            layer.on("click", function(){
                let name = feature.properties.name;
                document.getElementById("constituencySelect").value = name;
                loadConstituencyData();
            });
        }
    }).addTo(map);

});


// LOAD DROPDOWN
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let select = document.getElementById("constituencySelect");

    json.data.forEach(c=>{
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}


// LOAD DATA
async function loadConstituencyData(){
    let name = document.getElementById("constituencySelect").value;
    if(!name) return;

    let res = await fetch("/api/constituency/" + encodeURIComponent(name));
    let json = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "";

    json.data.forEach(r=>{
        div.innerHTML += `
        <div class="card">
            <b>${r.Candidate_Name}</b><br>
            ${r.Party}<br>
            Votes: ${r.Votes}<br>
            Status: ${r.Status}
        </div>
        `;
    });
}


// SEARCH
document.getElementById("searchBox").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();

    let options = document.querySelectorAll("#constituencySelect option");

    options.forEach(o=>{
        if(o.value.toLowerCase().includes(value)){
            o.style.display = "block";
        }else{
            o.style.display = "none";
        }
    });
});


// INIT
loadConstituencies();

</script>

</body>
</html>
