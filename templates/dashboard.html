<!DOCTYPE html>
<html>
<head>
<title>Kerala Election Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6fb; }

.container { width:90%; margin:auto; }

select { padding:8px; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td {
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

th { background:#ddd; }

#status {
    text-align:center;
    margin:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;">Kerala Election Dashboard</h1>

<div id="status">Loading...</div>

<!-- DROPDOWN -->
<div style="text-align:center;">
    <select id="constituencySelect" onchange="loadConstituencyData()">
        <option value="">Select Constituency</option>
    </select>
</div>

<!-- RESULT TABLE -->
<h3 style="text-align:center;">Constituency Wise Results</h3>

<table>
<thead>
<tr>
<th>Candidate</th>
<th>Party</th>
<th>Votes</th>
<th>Status</th>
</tr>
</thead>
<tbody id="constituencyTable"></tbody>
</table>

</div>

<script>

let currentConstituency = "";

// LOAD DROPDOWN
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let select = document.getElementById("constituencySelect");

    json.data.forEach(c=>{
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}


// LOAD DATA
async function loadConstituencyData(){
    let name = document.getElementById("constituencySelect").value;

    if(!name) return;

    currentConstituency = name;

    let res = await fetch("/api/constituency/" + encodeURIComponent(name));
    let json = await res.json();

    let table = document.getElementById("constituencyTable");
    table.innerHTML = "";

    if(!json.data || json.data.length === 0){
        table.innerHTML = "<tr><td colspan='4'>No Data</td></tr>";
        return;
    }

    json.data.forEach(r=>{
        table.innerHTML += `
        <tr>
            <td>${r.Candidate_Name}</td>
            <td>${r.Party}</td>
            <td>${r.Votes}</td>
            <td>${r.Status}</td>
        </tr>
        `;
    });

    document.getElementById("status").innerText = "Live Updated";
}


// AUTO REFRESH
setInterval(()=>{
    if(currentConstituency){
        loadConstituencyData();
    }
}, 10000);


// INIT
loadConstituencies();

</script>

</body>
</html>
