<!DOCTYPE html>
<html>
<head>
<title>Kerala Election Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }

.container { display:flex; height:100vh; }

#map { width:60%; }

.sidebar {
    width:40%;
    padding:20px;
    overflow:auto;
    background:#f4f6fb;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
}

.card {
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

    <!-- MAP -->
    <div id="map"></div>

    <!-- SIDE PANEL -->
    <div class="sidebar">

        <h2>Search</h2>

        <input id="searchBox" placeholder="Search constituency...">

        <select id="constituencySelect" onchange="loadConstituencyData()">
            <option value="">Select Constituency</option>
        </select>

        <div id="results"></div>

    </div>

</div>

<script>

// INIT MAP
let map = L.map('map').setView([10.5, 76.2], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);


// ALLIANCE
function getAlliance(party){
    party = party.toUpperCase();

    if(["INC","IUML"].includes(party)) return "UDF";
    if(["CPIM","CPI"].includes(party)) return "LDF";
    if(["BJP"].includes(party)) return "NDA";

    return "Others";
}

// COLOR
function getColor(a){
    if(a==="UDF") return "#1e90ff";
    if(a==="LDF") return "#e74c3c";
    if(a==="NDA") return "#f39c12";
    return "#ccc";
}


// LOAD MAP
async function loadMap(){

    let geo = await fetch("/static/kerala.geojson").then(r=>r.json());
    let api = await fetch("https://api.opendatakerala.org/api/kla2026/results/all.json")
                .then(r=>r.json());

    L.geoJSON(geo, {

        style: function(feature){

            let name = feature.properties.AC_NAME;

            let candidates = api.filter(d =>
                d.constituency.toLowerCase() === name.toLowerCase()
            );

            let winner = candidates.find(c => c.status.toLowerCase() === "won");

            if(!winner){
                let leading = candidates.find(c => c.status.toLowerCase() === "leading");
                if(leading){
                    return { fillColor: getColor(getAlliance(leading.party)), weight:1, color:"#333", fillOpacity:0.7 };
                }
            }

            if(winner){
                return { fillColor: getColor(getAlliance(winner.party)), weight:1, color:"#333", fillOpacity:0.9 };
            }

            return { fillColor:"#ccc", weight:1, color:"#333", fillOpacity:0.5 };
        },

        onEachFeature: function(feature, layer){

            let name = feature.properties.AC_NAME;

            layer.bindTooltip(name);

            layer.on("click", function(){
                document.getElementById("constituencySelect").value = name;
                loadConstituencyData();
            });
        }

    }).addTo(map);
}

loadMap();


// LOAD CONSTITUENCIES
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let select = document.getElementById("constituencySelect");

    json.data.forEach(c=>{
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}

loadConstituencies();


// LOAD RESULTS
async function loadConstituencyData(){
    let name = document.getElementById("constituencySelect").value;
    if(!name) return;

    let res = await fetch("/api/constituency/" + encodeURIComponent(name));
    let json = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "";

    json.data.forEach(r=>{
        div.innerHTML += `
        <div class="card">
            <b>${r.Candidate_Name}</b><br>
            ${r.Party}<br>
            Votes: ${r.votes}<br>
            Status: ${r.status}
        </div>
        `;
    });
}


// SEARCH FILTER
document.getElementById("searchBox").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();

    let options = document.querySelectorAll("#constituencySelect option");

    options.forEach(o=>{
        if(o.value.toLowerCase().includes(val)){
            o.style.display = "block";
        } else {
            o.style.display = "none";
        }
    });
});


// AUTO REFRESH MAP
setInterval(()=>{
    map.eachLayer(layer=>{
        if(layer instanceof L.GeoJSON){
            map.removeLayer(layer);
        }
    });
    loadMap();
}, 15000);

</script>

</body>
</html>
