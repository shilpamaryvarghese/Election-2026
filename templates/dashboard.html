<!DOCTYPE html>
<html>
<head>
    <title>Kerala Election Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 style="text-align:center;">Kerala Election Dashboard</h1>

<!-- STATUS -->
<p id="status" style="text-align:center; font-weight:bold;">Loading...</p>

<!-- CARDS -->
<div id="cards" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>

<!-- TABLE -->
<table border="1" style="margin:auto; margin-top:20px; width:60%; text-align:center;">
<thead>
<tr>
<th>Party</th>
<th>Won</th>
<th>Leading</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<!-- DROPDOWN -->
<div style="text-align:center; margin-top:20px;">
    <select id="constituencySelect" onchange="goToConstituency()">
        <option value="">Select Constituency</option>
    </select>
</div>

<!-- CHART -->
<div style="width:400px; margin:auto;">
    <canvas id="chart"></canvas>
</div>

<script>

let chart;

// ---------------- LOAD PARTY DATA ----------------
async function load(){
    try{
        let res = await fetch("/api/party-summary");
        let json = await res.json();

        console.log("API DATA:", json);  // 🔥 DEBUG

        let cards = document.getElementById("cards");
        let table = document.getElementById("tableData");
        let status = document.getElementById("status");

        cards.innerHTML = "";
        table.innerHTML = "";

        if(!json.data || json.data.length === 0){
            status.innerText = "No data available";
            return;
        }

        status.innerText = json.dummy ? "Showing Dummy Data" : "Live Data";

        let labels = [];
        let values = [];

        json.data.forEach(p=>{
            // CARDS
            cards.innerHTML += `
            <div style="
                background:#333;
                color:white;
                padding:15px;
                margin:10px;
                border-radius:8px;
                width:120px;
                text-align:center;
            ">
                <b>${p.Party}</b>
                <h2>${p.Total}</h2>
            </div>
            `;

            // TABLE
            table.innerHTML += `
            <tr>
                <td>${p.Party}</td>
                <td>${p.Won}</td>
                <td>${p.Leading}</td>
                <td>${p.Total}</td>
            </tr>
            `;

            labels.push(p.Party);
            values.push(p.Total);
        });

        drawChart(labels, values);

    }catch(err){
        console.error(err);
        document.getElementById("status").innerText = "Error loading data";
    }
}


// ---------------- LOAD CONSTITUENCIES ----------------
async function loadConstituencies(){
    try{
        let res = await fetch("/api/constituencies");
        let json = await res.json();

        let select = document.getElementById("constituencySelect");

        json.data.forEach(c=>{
            select.innerHTML += `<option value="${c}">${c}</option>`;
        });

    }catch(err){
        console.error("Dropdown error:", err);
    }
}


// ---------------- NAVIGATION ----------------
function goToConstituency(){
    let name = document.getElementById("constituencySelect").value;

    if(name){
        window.location = "/constituency/" + encodeURIComponent(name);
    }
}


// ---------------- CHART ----------------
function drawChart(labels, values){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
}


// ---------------- AUTO LOAD ----------------
load();
loadConstituencies();
setInterval(load, 15000);

</script>

</body>
</html>
