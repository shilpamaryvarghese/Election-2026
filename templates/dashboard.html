<!DOCTYPE html>
<html>
<head>
<title>Election Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- DARK MODE TOGGLE -->
<div class="toggle" onclick="toggleDark()">🌙</div>

<!-- HEADER -->
<div class="header">
    Kerala Election Results 2026
</div>

<!-- SUMMARY -->
<div class="summary">
    <div class="card UDF"><h3>UDF</h3><h1 id="udf">0</h1></div>
    <div class="card LDF"><h3>LDF</h3><h1 id="ldf">0</h1></div>
    <div class="card NDA"><h3>NDA</h3><h1 id="nda">0</h1></div>
    <div class="card OTH"><h3>Others</h3><h1 id="oth">0</h1></div>
</div>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <canvas id="barChart"></canvas>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <input id="search" placeholder="Search constituency...">

        <select id="select" onchange="loadData()">
            <option value="">Select Constituency</option>
        </select>

        <div id="results">
            <div class="loader"></div>
        </div>

    </div>

</div>

<script>

// 🔥 SMOOTH COUNT ANIMATION
function animateValue(id, start, end, duration) {
    let obj = document.getElementById(id);
    let range = end - start;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        let progress = Math.min((timestamp - startTime) / duration, 1);
        obj.innerText = Math.floor(progress * range + start);
        if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}


// 🌙 DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");
}


// 📊 LOAD SUMMARY
async function loadSummary(){
    let res = await fetch("/api/summary");
    let json = await res.json();

    let udf=0, ldf=0, nda=0, oth=0;

    json.data.forEach(d=>{
        if(d.Alliance==="UDF") udf=d.Seats;
        if(d.Alliance==="LDF") ldf=d.Seats;
        if(d.Alliance==="NDA") nda=d.Seats;
        if(d.Alliance==="Others") oth=d.Seats;
    });

    animateValue("udf", parseInt(document.getElementById("udf").innerText)||0, udf, 800);
    animateValue("ldf", parseInt(document.getElementById("ldf").innerText)||0, ldf, 800);
    animateValue("nda", parseInt(document.getElementById("nda").innerText)||0, nda, 800);
    animateValue("oth", parseInt(document.getElementById("oth").innerText)||0, oth, 800);

    loadChart(json.data);
}


// 📊 CHART
let chart;
function loadChart(data){

    let labels = data.map(d=>d.Alliance);
    let seats = data.map(d=>d.Seats);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("barChart"), {
        type:'bar',
        data:{
            labels:labels,
            datasets:[{ data:seats }]
        }
    });
}


// 📍 LOAD CONSTITUENCIES
async function loadConstituencies(){
    let res = await fetch("/api/constituencies");
    let json = await res.json();

    let sel = document.getElementById("select");

    json.data.forEach(c=>{
        sel.innerHTML += `<option value="${c}">${c}</option>`;
    });
}


// 📍 LOAD RESULTS
async function loadData(){

    let name = document.getElementById("select").value;
    if(!name) return;

    let div = document.getElementById("results");

    // ⏳ LOADING
    div.innerHTML = `<div class="loader"></div>`;

    let res = await fetch("/api/constituency/"+name);
    let json = await res.json();

    div.innerHTML = "";

    let maxVotes = Math.max(...json.data.map(r => Number(r.votes)));

    json.data.forEach(r => {

        let percent = maxVotes ? (r.votes / maxVotes) * 100 : 0;

        let isWinner = (r.status || "").toLowerCase() === "won";

        div.innerHTML += `
        <div class="result ${isWinner ? "winner" : ""}">
            <b>${r.Candidate_Name}</b><br>
            ${r.Party}<br>
            Votes: ${r.votes}<br>
            Status: ${r.status}

            <div class="bar" style="width:${percent}%"></div>
        </div>`;
    });
}


// 🔍 SEARCH FILTER
document.getElementById("search").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    let options = document.querySelectorAll("#select option");

    options.forEach(o=>{
        o.style.display = o.value.toLowerCase().includes(val) ? "block" : "none";
    });
});


// 🔄 AUTO REFRESH
setInterval(loadSummary, 10000);


// 🚀 INIT
loadSummary();
loadConstituencies();

</script>

</body>
</html>
