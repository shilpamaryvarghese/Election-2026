<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Live Election Dashboard
</title>

<link
    rel="stylesheet"
    href="/static/style.css"
>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>
        Kerala Election 2026
    </h2>

    <div class="nav-links">

        <a href="/">
            Home
        </a>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/constituency">
            Constituency
        </a>

        <a href="/partywise">
            Party Wise
        </a>

        <a href="/candidates">
            Candidates
        </a>

    </div>

</div>


<!-- BACKGROUND -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>


<!-- CONTAINER -->

<div class="container">

    <h1 class="page-title">
        📊 Live Election Dashboard
    </h1>

    <p class="subtitle">
        Real-time Kerala Election 2026 Candidate Results
    </p>


    <!-- SEARCH -->

    <div class="search-area">

        <input
            type="text"
            id="search"
            placeholder="Search constituency, candidate or party..."
        >

    </div>


    <!-- STATS -->

    <div class="seat-container">

        <div class="seat-card udf">

            <h3>
                Total Candidates
            </h3>

            <h1 id="totalCandidates">
                0
            </h1>

        </div>


        <div class="seat-card ldf">

            <h3>
                Total Votes
            </h3>

            <h1 id="totalVotes">
                0
            </h1>

        </div>


        <div class="seat-card nda">

            <h3>
                Leading
            </h3>

            <h1 id="leadingCount">
                0
            </h1>

        </div>


        <div class="seat-card oth">

            <h3>
                Won
            </h3>

            <h1 id="wonCount">
                0
            </h1>

        </div>

    </div>


    <!-- TABLE -->

    <div class="table-box">

        <table>

            <thead>

                <tr>

                    <th>
                        Constituency
                    </th>

                    <th>
                        Candidate
                    </th>

                    <th>
                        Party
                    </th>

                    <th>
                        Votes
                    </th>

                    <th>
                        %
                    </th>

                    <th>
                        Status
                    </th>

                </tr>

            </thead>

            <tbody id="body"></tbody>

        </table>

    </div>

</div>


<script>

let fullData = [];


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/results"
        );

        let json = await res.json();

        fullData = json.data || [];

        renderTable(fullData);

        updateStats(fullData);

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* PARTY COLORS */

function getPartyColor(p){

    p = (p || "").toUpperCase();

    if(
        p.includes("INC")
    ){
        return "#2563eb";
    }

    if(
        p.includes("CPM")
        ||
        p.includes("CPI")
    ){
        return "#dc2626";
    }

    if(
        p.includes("BJP")
    ){
        return "#f59e0b";
    }

    return "#64748b";

}


/* RENDER TABLE */

function renderTable(data){

    let tbody =
        document.getElementById(
            "body"
        );

    tbody.innerHTML = "";


    data.forEach(r => {

        let color =
            getPartyColor(
                r.Party
            );

        let status =
            (
                r.Status || "-"
            ).toLowerCase();

        let badgeClass = "status-other";

        if(
            status.includes("won")
        ){
            badgeClass = "status-won";
        }

        else if(
            status.includes("lead")
        ){
            badgeClass = "status-leading";
        }


        tbody.innerHTML += `

        <tr>

            <td>

                ${r.Constituency || "-"}

            </td>

            <td>

                <strong>

                    ${r.Candidate || "-"}

                </strong>

            </td>

            <td>

                <span
                    style="
                        color:${color};
                        font-weight:700;
                    "
                >

                    ${r.Party || "-"}

                </span>

            </td>

            <td>

                ${Number(
                    r.Votes || 0
                ).toLocaleString()}

            </td>

            <td>

                ${r.Percent || 0}%

            </td>

            <td>

                <span class="${badgeClass}">

                    ${r.Status || "-"}

                </span>

            </td>

        </tr>

        `;

    });

}


/* UPDATE STATS */

function updateStats(data){

    let totalCandidates =
        data.length;

    let totalVotes = 0;

    let leading = 0;

    let won = 0;


    data.forEach(r => {

        totalVotes += parseInt(
            r.Votes || 0
        );

        let status =
            (
                r.Status || ""
            ).toLowerCase();

        if(
            status.includes("lead")
        ){
            leading++;
        }

        if(
            status.includes("won")
        ){
            won++;
        }

    });


    document
    .getElementById(
        "totalCandidates"
    )
    .innerText = totalCandidates;


    document
    .getElementById(
        "totalVotes"
    )
    .innerText =

        Number(totalVotes)
        .toLocaleString();


    document
    .getElementById(
        "leadingCount"
    )
    .innerText = leading;


    document
    .getElementById(
        "wonCount"
    )
    .innerText = won;

}


/* SEARCH */

document
.getElementById(
    "search"
)
.addEventListener(
    "keyup",
    function(){

        let value =
            this.value.toLowerCase();

        let filtered =

            fullData.filter(r =>

                (
                    r.Constituency || ""
                )
                .toLowerCase()
                .includes(value)

                ||

                (
                    r.Candidate || ""
                )
                .toLowerCase()
                .includes(value)

                ||

                (
                    r.Party || ""
                )
                .toLowerCase()
                .includes(value)

            );

        renderTable(filtered);

    }
);


/* AUTO REFRESH */

setInterval(
    loadData,
    15000
);

</script>

</body>
</html>
