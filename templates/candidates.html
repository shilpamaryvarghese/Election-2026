<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candidate Search</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>Kerala Election 2026</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/constituency">Constituency</a>
        <a href="/partywise">Party Wise</a>
        <a href="/candidates">Candidates</a>
    </div>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

    <h2 class="page-title">Candidate Search</h2>

    <!-- SEARCH -->

    <div class="search-area">

        <input
            type="text"
            id="searchInput"
            placeholder="Search candidate, party, constituency..."
        >

        <button class="btn" onclick="searchCandidate()">
            Search
        </button>

    </div>

    <!-- RESULTS -->

    <div id="results" class="results">

        <div class="loader">
            Loading candidates...
        </div>

    </div>

</div>

<script>

let fullData = [];


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch("/api/results");

        let json = await res.json();

        fullData = json.data || [];

        document.getElementById("results").innerHTML = `
            <div class="no-result">
                Search candidates by name, party or constituency
            </div>
        `;

    }

    catch(err){

        console.log(err);

        document.getElementById("results").innerHTML = `
            <div class="no-result">
                Failed to load data
            </div>
        `;
    }
}

loadData();


/* PHOTO */

function getPhoto(name){

    return "https://ui-avatars.com/api/?name="
        + encodeURIComponent(name)
        + "&background=random";

}


/* SEARCH */

function searchCandidate(){

    let value = document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    let container = document.getElementById("results");

    container.innerHTML = "";

    if(!value){

        container.innerHTML = `
            <div class="no-result">
                Please enter a search term
            </div>
        `;

        return;
    }

    let filtered = fullData.filter(r =>

        (r.Candidate || "")
        .toLowerCase()
        .includes(value)

        ||

        (r.Party || "")
        .toLowerCase()
        .includes(value)

        ||

        (r.Constituency || "")
        .toLowerCase()
        .includes(value)

    );

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="no-result">
                ❌ Candidate not found
            </div>
        `;

        return;
    }

    filtered.forEach(r => {

        let percent = r.Percent
            ? parseFloat(r.Percent).toFixed(1)
            : 0;

        if(percent > 100){
            percent = 100;
        }

        let statusClass = "other";

        if((r.Status || "").toLowerCase() === "won"){
            statusClass = "winner";
        }

        else if((r.Status || "").toLowerCase() === "leading"){
            statusClass = "leading";
        }

        let partyColor = "#999";

        if((r.Party || "").includes("INC")){
            partyColor = "#1e90ff";
        }

        else if(
            (r.Party || "").includes("CPM")
            ||
            (r.Party || "").includes("CPI")
        ){
            partyColor = "#ff4b2b";
        }

        else if((r.Party || "").includes("BJP")){
            partyColor = "#f7971e";
        }

        let card = `

        <div
            class="candidate-card ${statusClass}"
            onclick="goTo('${r.Constituency}')"
        >

            <div class="card-top">

                <img
                    src="${getPhoto(r.Candidate)}"
                    class="photo"
                >

                <div>

                    <div class="name">
                        ${r.Candidate}
                    </div>

                    <div
                        class="party"
                        style="color:${partyColor}"
                    >
                        ${r.Party}
                    </div>

                    <div class="const">
                        📍 ${r.Constituency}
                    </div>

                </div>

            </div>

            <div class="details">

                <div class="detail-box">

                    <div class="label">
                        Votes
                    </div>

                    <div class="value">
                        ${r.Votes}
                    </div>

                </div>

                <div class="detail-box">

                    <div class="label">
                        Status
                    </div>

                    <div class="value">
                        ${r.Status || "N/A"}
                    </div>

                </div>

            </div>

            <div class="bar">

                <div
                    class="fill"
                    style="
                        width:${percent}%;
                        background:${partyColor}
                    "
                >
                    ${percent}%
                </div>

            </div>

        </div>

        `;

        container.innerHTML += card;

    });

}


/* REDIRECT */

function goTo(name){

    window.location.href =
        "/constituency?name="
        + encodeURIComponent(name);

}


/* ENTER SUPPORT */

document
.getElementById("searchInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        searchCandidate();
    }

});

</script>

</body>
</html>
