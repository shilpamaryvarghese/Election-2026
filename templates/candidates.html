<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Candidate Search
</title>

<link
    rel="stylesheet"
    href="/static/style.css"
>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>
        Kerala Election 2026
    </h2>

    <div class="nav-links">

        <a href="/">
            Home
        </a>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/constituency">
            Constituency
        </a>

        <a href="/partywise">
            Party Wise
        </a>

        <a href="/candidates">
            Candidates
        </a>

    </div>

</div>


<!-- BACKGROUND -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>


<!-- CONTAINER -->

<div class="container">

    <h1 class="page-title">
        🔍 Candidate Search
    </h1>

    <p class="subtitle">
        Search Kerala Election 2026 Candidates
    </p>


    <!-- SEARCH -->

    <div class="search-area">

        <input
            type="text"
            id="searchInput"
            placeholder="Search candidate, party or alliance..."
        >

        <button
            class="btn"
            onclick="searchCandidate()"
        >
            Search
        </button>

    </div>


    <!-- RESULTS -->

    <div
        id="results"
        class="candidate-grid"
    ></div>

</div>


<script>

let fullData = [];


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/results"
        );

        let json = await res.json();

        fullData = json.data || [];

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* PARTY COLOR */

function getColor(alliance){

    if(alliance === "UDF"){
        return "#2563eb";
    }

    if(alliance === "LDF"){
        return "#dc2626";
    }

    if(alliance === "NDA"){
        return "#f59e0b";
    }

    return "#64748b";

}


/* SEARCH */

function searchCandidate(){

    let value =

        document
        .getElementById(
            "searchInput"
        )
        .value
        .trim()
        .toLowerCase();

    let container =
        document.getElementById(
            "results"
        );

    container.innerHTML = "";


    if(!value){

        container.innerHTML = `

        <div class="empty-box">

            Please enter candidate name

        </div>

        `;

        return;

    }


    let filtered =

        fullData.filter(r =>

            (
                r.Candidate || ""
            )
            .toLowerCase()
            .includes(value)

            ||

            (
                r.Party || ""
            )
            .toLowerCase()
            .includes(value)

            ||

            (
                r.Alliance || ""
            )
            .toLowerCase()
            .includes(value)

        );


    if(filtered.length === 0){

        container.innerHTML = `

        <div class="empty-box">

            ❌ Candidate Not Found

        </div>

        `;

        return;

    }


    filtered.forEach(r => {

        let alliance =
            r.Alliance || "Others";

        let color =
            getColor(alliance);

        let photo =

            r.Photo

            ?

            "https://api.opendatakerala.org/api/kla2026/images/candidates/"

            +

            r.Photo

            :

            "https://ui-avatars.com/api/?name="

            +

            encodeURIComponent(
                r.Candidate
            )

            +

            "&background=random";


        container.innerHTML += `

        <div
            class="candidate-card"
            onclick="
                viewConstituency(
                    '${r.Constituency}'
                )
            "
        >

            <!-- TOP -->

            <div class="candidate-top">

                <img
                    src="${photo}"
                    class="candidate-photo"
                >

                <div>

                    <h2 class="candidate-name">

                        ${r.Candidate}

                    </h2>

                    <p
                        class="candidate-party"
                        style="
                            color:${color}
                        "
                    >

                        ${r.Party}

                    </p>

                </div>

            </div>


            <!-- DETAILS -->

            <div class="candidate-details">

                <div class="detail-box">

                    <span>
                        Alliance
                    </span>

                    <strong>
                        ${alliance}
                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Constituency
                    </span>

                    <strong>
                        ${r.Constituency}
                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Votes
                    </span>

                    <strong>

                        ${Number(
                            r.Votes || 0
                        ).toLocaleString()}

                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Status
                    </span>

                    <strong>

                        ${r.Status || "-"}

                    </strong>

                </div>

            </div>


            <!-- PROGRESS -->

            <div class="vote-bar">

                <div
                    class="vote-fill"
                    style="
                        width:${r.Percent || 0}%;
                        background:${color}
                    "
                >

                    ${r.Percent || 0}%

                </div>

            </div>

        </div>

        `;

    });

}


/* ENTER SUPPORT */

document
.getElementById(
    "searchInput"
)
.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){
            searchCandidate();
        }

    }
);


/* REDIRECT */

function viewConstituency(name){

    window.location.href =

        "/constituency?name="

        +

        encodeURIComponent(name);

}

</script>

</body>
</html>
