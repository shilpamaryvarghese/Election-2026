<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Candidate Search
</title>

<link
    rel="stylesheet"
    href="/static/style.css"
>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>
        Kerala Election 2026
    </h2>

    <div class="nav-links">

        <a href="/">
            Home
        </a>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/constituency">
            Constituency
        </a>

        <a href="/partywise">
            Party Wise
        </a>

        <a href="/candidates">
            Candidates
        </a>

    </div>

</div>


<!-- BACKGROUND -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>


<!-- CONTAINER -->

<div class="container">

    <h1 class="page-title">
        🔍 Candidate Search
    </h1>

    <p class="subtitle">
        Search Kerala Election 2026 Candidates
    </p>


    <!-- SEARCH -->

    <div class="search-area">

        <input
            type="text"
            id="searchInput"
            placeholder="Search candidate name..."
        >

        <button
            class="btn"
            onclick="searchCandidate()"
        >
            Search
        </button>

    </div>


    <!-- RESULTS -->

    <div
        id="results"
        class="candidate-grid"
    ></div>

</div>


<script>

let fullData = [];


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/results"
        );

        let json = await res.json();

        fullData = json.data || [];

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* ALLIANCE COLOR */

function getColor(alliance){

    alliance =
        (alliance || "")
        .toUpperCase();

    if(alliance.includes("UDF")){
        return "#2563eb";
    }

    if(alliance.includes("LDF")){
        return "#dc2626";
    }

    if(alliance.includes("NDA")){
        return "#f59e0b";
    }

    return "#64748b";

}


/* SEARCH */

function searchCandidate(){

    let value =

        document
        .getElementById(
            "searchInput"
        )
        .value
        .trim()
        .toLowerCase();

    let container =
        document.getElementById(
            "results"
        );

    container.innerHTML = "";


    if(!value){

        container.innerHTML = `

        <div class="empty-box">

            Please enter candidate name

        </div>

        `;

        return;

    }


    let filtered =

        fullData.filter(r =>

            (
                r.name || ""
            )
            .toLowerCase()
            .includes(value)

        );


    if(filtered.length === 0){

        container.innerHTML = `

        <div class="empty-box">

            ❌ Candidate Not Found

        </div>

        `;

        return;

    }


    filtered.forEach(r => {

        let color =
            getColor(
                r.alliance
            );

        let photo =

            r.photo

            ?

            "https://api.opendatakerala.org/api/kla2026/images/candidates/"

            +

            r.photo

            :

            "https://ui-avatars.com/api/?name="

            +

            encodeURIComponent(
                r.name
            )

            +

            "&background=random";


        container.innerHTML += `

        <div class="candidate-card">

            <!-- TOP -->

            <div class="candidate-top">

                <img
                    src="${photo}"
                    class="candidate-photo"
                >

                <div>

                    <h2 class="candidate-name">

                        ${r.name}

                    </h2>

                    <p class="candidate-ml">

                        ${r.name_ml || ""}

                    </p>

                </div>

            </div>


            <!-- PARTY -->

            <div
                class="candidate-party-box"
                style="
                    background:${color};
                "
            >

                ${r.alliance}

            </div>


            <!-- DETAILS -->

            <div class="candidate-details">

                <div class="detail-box">

                    <span>
                        Alliance
                    </span>

                    <strong>

                        ${r.alliance}

                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Party
                    </span>

                    <strong>

                        ${r.party}

                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Votes
                    </span>

                    <strong>

                        ${Number(
                            r.votes || 0
                        ).toLocaleString()}

                    </strong>

                </div>

                <div class="detail-box">

                    <span>
                        Sitting
                    </span>

                    <strong>

                        ${r.sitting || "-"}

                    </strong>

                </div>

            </div>

        </div>

        `;

    });

}


/* ENTER KEY */

document
.getElementById(
    "searchInput"
)
.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){

            searchCandidate();

        }

    }
);

</script>

</body>
</html>
