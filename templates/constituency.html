<!DOCTYPE html>
<html>
<head>
<title>Constituency Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }

select { padding:10px; margin-bottom:20px; }

/* WINNER */
.winner-box {
    background:#28a745;
    color:white;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

/* TABLE */
table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th {
    background:#0b3d91;
    color:white;
}

td,th { padding:8px; border:1px solid #ddd; }

tr.winner {
    background:#d4edda;
    font-weight:bold;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<h2>Constituency Results</h2>

<select id="dropdown"></select>

<div class="winner-box" id="winnerBox"></div>

<div class="grid">

<div>
<canvas id="barChart"></canvas>

<table>
<thead>
<tr>
<th>Candidate</th>
<th>Party</th>
<th>Total Votes</th>
<th>%</th>
<th>Alliance</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<div class="card">
<h3>Vote Share</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

// 🎨 PARTY → ALLIANCE
function getAlliance(p){
    p = p.toUpperCase();

    if(["INC","IUML","RSP"].some(x=>p.includes(x))) return "UDF";
    if(["CPM","CPI"].some(x=>p.includes(x))) return "LDF";
    if(["BJP","BDJS"].some(x=>p.includes(x))) return "NDA";

    return "Others";
}

// 🎨 COLORS
function getColor(p){
    let a = getAlliance(p);
    if(a==="UDF") return "#1e90ff";
    if(a==="LDF") return "#ff4b2b";
    if(a==="NDA") return "#ff9800";
    return "#777";
}

// 🎯 ANIMATE NUMBER
function animateValue(el, end){
    let start = 0;
    let duration = 800;
    let startTime = null;

    function step(ts){
        if(!startTime) startTime = ts;
        let progress = Math.min((ts-startTime)/duration,1);
        el.innerText = Math.floor(progress * end);
        if(progress<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

// LOAD DROPDOWN
async function loadDropdown(){
    let res = await fetch("/api/results");
    let json = await res.json();

    let names = [...new Set(json.data.map(d=>d.Constituency))];

    let dd = document.getElementById("dropdown");
    dd.innerHTML = `<option>Select Constituency</option>`;

    names.forEach(n=>{
        dd.innerHTML += `<option value="${n}">${n}</option>`;
    });
}

let barChart, pieChart;

// LOAD DATA
async function loadData(name){

    let res = await fetch("/api/constituency/" + name);
    let json = await res.json();

    let tbody = document.getElementById("body");
    tbody.innerHTML = "";

    let labels=[], votes=[], colors=[];

    let totalVotes = 0;
    let allianceMap = {UDF:0, LDF:0, NDA:0, Others:0};

    let winner = null;

    json.data.forEach(r=>{

        let total = parseInt(r.Total);

        labels.push(r.Candidate);
        votes.push(total);
        colors.push(getColor(r.Party));

        totalVotes += total;

        let alliance = getAlliance(r.Party);
        allianceMap[alliance] += total;

        if(!winner || total > winner.Total){
            winner = {...r, Total: total};
        }
    });

    // 🏆 WINNER
    let box = document.getElementById("winnerBox");
    box.style.display = "block";
    box.innerHTML = `🏆 ${winner.Candidate} (${winner.Party}) - ${winner.Total} votes`;

    // TABLE
    json.data.forEach(r=>{
        let cls = r.Candidate === winner.Candidate ? "winner" : "";
        let alliance = getAlliance(r.Party);

        tbody.innerHTML += `
        <tr class="${cls}">
            <td>${r.Candidate}</td>
            <td>${r.Party}</td>
            <td class="count">${r.Total}</td>
            <td>${r.Percent}</td>
            <td>${alliance}</td>
        </tr>`;
    });

    // 🔥 LIVE COUNT ANIMATION
    document.querySelectorAll(".count").forEach((el,i)=>{
        animateValue(el, votes[i]);
    });

    // 📊 BAR CHART (ANIMATED)
    if(barChart) barChart.destroy();

    barChart = new Chart(document.getElementById("barChart"),{
        type:'bar',
        data:{ labels, datasets:[{ data:votes, backgroundColor:colors }]},
        options:{
            animation:{ duration:1000 },
            plugins:{
                legend:{display:false},
                datalabels:{
                    formatter:(v)=> ((v/totalVotes)*100).toFixed(1)+"%"
                }
            }
        },
        plugins:[ChartDataLabels]
    });

    // 🥧 PIE CHART (ALLIANCE)
    if(pieChart) pieChart.destroy();

    pieChart = new Chart(document.getElementById("pieChart"),{
        type:'pie',
        data:{
            labels:Object.keys(allianceMap),
            datasets:[{
                data:Object.values(allianceMap),
                backgroundColor:["#1e90ff","#ff4b2b","#ff9800","#777"]
            }]
        }
    });
}

// EVENT
document.getElementById("dropdown").addEventListener("change", e=>{
    if(e.target.value !== "Select Constituency"){
        loadData(e.target.value);
    }
});

loadDropdown();

</script>

</body>
</html>
