<!DOCTYPE html>
<html>
<head>
    <title>Constituency</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
    <h1>Constituency Results</h1>
</div>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/candidates">Candidates</a>
    <a href="/partywise">Party Wise</a>
</div>

<div class="container">

<h2>{{name}}</h2>

<table>
<thead>
<tr>
<th>Candidate</th>
<th>Party</th>
<th>Status</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>
async function load(){
    let name = "{{name}}";

    let res = await fetch(`/api/constituency/${name}`);
    let json = await res.json();

    let tbody = document.getElementById("data");
    tbody.innerHTML = "";

    json.data.forEach(r=>{
        tbody.innerHTML += `
        <tr>
        <td>${r.Candidate_Name}</td>
        <td>${r.Party}</td>
        <td>${r.Status}</td>
        </tr>`;
    });
}

setInterval(load, 10000);
load();
</script>

</body>
</html>
