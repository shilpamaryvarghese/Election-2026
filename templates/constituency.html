<!DOCTYPE html>
<html>
<head>
<title>Constituency Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>
body { font-family: Arial; padding:20px; }

select {
    padding:10px;
    margin-bottom:20px;
}

/* WINNER BANNER */
.winner-box {
    background: #28a745;
    color: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    display: none;
}

/* TABLE */
table {
    width:100%;
    border-collapse: collapse;
}

th {
    background:#0b3d91;
    color:white;
}

td,th {
    padding:8px;
    border:1px solid #ddd;
}

tr.winner {
    background:#d4edda;
    font-weight:bold;
}

</style>

</head>

<body>

<h2>Constituency Results</h2>

<select id="dropdown"></select>

<div class="winner-box" id="winnerBox"></div>

<canvas id="chart" height="120"></canvas>

<table>
<thead>
<tr>
<th>Candidate</th>
<th>Party</th>
<th>Total Votes</th>
<th>%</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

// 🎨 PARTY COLORS
function getPartyColor(party){
    party = party.toUpperCase();

    if(party.includes("INC")) return "#1e90ff";
    if(party.includes("CPM") || party.includes("CPI")) return "#ff4b2b";
    if(party.includes("BJP")) return "#ff9800";

    return "#888"; // others
}

// LOAD DROPDOWN
async function loadDropdown(){

    let res = await fetch("/api/results");
    let json = await res.json();

    let names = [...new Set(json.data.map(d=>d.Constituency))];

    let dd = document.getElementById("dropdown");

    dd.innerHTML = `<option>Select Constituency</option>`;

    names.forEach(n=>{
        dd.innerHTML += `<option value="${n}">${n}</option>`;
    });
}

let chart;

// LOAD DATA
async function loadData(name){

    let res = await fetch("/api/constituency/" + name);
    let json = await res.json();

    let tbody = document.getElementById("body");
    tbody.innerHTML = "";

    let labels = [];
    let votes = [];
    let colors = [];

    let winner = null;

    json.data.forEach(r=>{

        let total = parseInt(r.Total);

        labels.push(r.Candidate);
        votes.push(total);
        colors.push(getPartyColor(r.Party));

        if(!winner || total > winner.Total){
            winner = {...r, Total: total};
        }
    });

    // 🏆 WINNER BANNER
    let box = document.getElementById("winnerBox");

    if(winner){
        box.style.display = "block";
        box.innerHTML = `
        🏆 Winner: <b>${winner.Candidate}</b> (${winner.Party})  
        <br>Votes: ${winner.Total}
        `;
    }

    // TABLE
    json.data.forEach(r=>{
        let cls = (r.Candidate === winner.Candidate) ? "winner" : "";

        tbody.innerHTML += `
        <tr class="${cls}">
            <td>${r.Candidate}</td>
            <td>${r.Party}</td>
            <td>${r.Total}</td>
            <td>${r.Percent}</td>
        </tr>`;
    });

    // CHART
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                data:votes,
                backgroundColor: colors
            }]
        },
        options:{
            plugins:{
                legend:{ display:false },

                // 📊 % LABELS
                datalabels:{
                    color:'black',
                    anchor:'end',
                    align:'top',
                    formatter: (val, ctx)=>{
                        let totalVotes = votes.reduce((a,b)=>a+b,0);
                        let percent = ((val/totalVotes)*100).toFixed(1);
                        return percent + "%";
                    }
                }
            }
        },
        plugins:[ChartDataLabels]
    });
}

// EVENT
document.getElementById("dropdown").addEventListener("change", function(){
    let val = this.value;
    if(val !== "Select Constituency"){
        loadData(val);
    }
});

loadDropdown();

</script>

</body>
</html>
