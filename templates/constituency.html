<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Constituency Result</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>Kerala Election 2026</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/constituency">Constituency</a>
        <a href="/partywise">Party Wise</a>
        <a href="/candidates">Candidates</a>
    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <h2 class="page-title">
        Constituency Results
    </h2>

    <!-- DROPDOWN -->

    <select id="dropdown" class="dropdown">
        <option>Loading...</option>
    </select>

    <!-- WINNER -->

    <div
        class="winner-box"
        id="winnerBox"
    ></div>

    <!-- GRID -->

    <div class="grid">

        <!-- LEFT -->

        <div>

            <div class="card">

                <canvas id="barChart"></canvas>

            </div>

            <div class="table-card">

                <table>

                    <thead>

                        <tr>
                            <th>Candidate</th>
                            <th>Party</th>
                            <th>Total Votes</th>
                            <th>%</th>
                            <th>Alliance</th>
                        </tr>

                    </thead>

                    <tbody id="body"></tbody>

                </table>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h3 class="chart-title">
                Vote Share
            </h3>

            <canvas id="pieChart"></canvas>

        </div>

    </div>

</div>

<script>

/* PARTY → ALLIANCE */

function getAlliance(p){

    p = (p || "").toUpperCase();

    if(
        ["INC","IUML","RSP"]
        .some(x => p.includes(x))
    ){
        return "UDF";
    }

    if(
        ["CPM","CPI"]
        .some(x => p.includes(x))
    ){
        return "LDF";
    }

    if(
        ["BJP","BDJS"]
        .some(x => p.includes(x))
    ){
        return "NDA";
    }

    return "Others";
}


/* PARTY COLORS */

function getColor(p){

    let a = getAlliance(p);

    if(a === "UDF"){
        return "#1e90ff";
    }

    if(a === "LDF"){
        return "#ff4b2b";
    }

    if(a === "NDA"){
        return "#ff9800";
    }

    return "#777";
}


/* ANIMATE NUMBER */

function animateValue(el, end){

    let duration = 800;
    let startTime = null;

    function step(ts){

        if(!startTime){
            startTime = ts;
        }

        let progress = Math.min(
            (ts - startTime) / duration,
            1
        );

        el.innerText = Math.floor(progress * end);

        if(progress < 1){
            requestAnimationFrame(step);
        }
    }

    requestAnimationFrame(step);
}


/* LOAD DROPDOWN */

async function loadDropdown(){

    try{

        let res = await fetch("/api/results");

        let json = await res.json();

        let names = [
            ...new Set(
                json.data.map(
                    d => d.Constituency
                )
            )
        ];

        names.sort();

        let dd = document.getElementById("dropdown");

        dd.innerHTML = `
            <option>
                Select Constituency
            </option>
        `;

        names.forEach(n => {

            dd.innerHTML += `
                <option value="${n}">
                    ${n}
                </option>
            `;

        });

        // AUTO LOAD FROM URL

        let params = new URLSearchParams(
            window.location.search
        );

        let selected = params.get("name");

        if(selected){

            dd.value = selected;

            loadData(selected);

        }

    }

    catch(err){

        console.log(err);

    }

}


let barChart;
let pieChart;


/* LOAD CONSTITUENCY DATA */

async function loadData(name){

    let res = await fetch(
        "/api/constituency/" +
        encodeURIComponent(name)
    );

    let json = await res.json();

    let tbody = document.getElementById("body");

    tbody.innerHTML = "";

    let labels = [];
    let votes = [];
    let colors = [];

    let totalVotes = 0;

    let allianceMap = {
        UDF:0,
        LDF:0,
        NDA:0,
        Others:0
    };

    let winner = null;

    json.data.forEach(r => {

        let total = parseInt(r.Votes || 0);

        labels.push(r.Candidate);

        votes.push(total);

        colors.push(
            getColor(r.Party)
        );

        totalVotes += total;

        let alliance = getAlliance(r.Party);

        allianceMap[alliance] += total;

        if(
            !winner
            ||
            total > winner.Votes
        ){

            winner = {
                ...r,
                Votes: total
            };

        }

    });


    /* WINNER BOX */

    let box = document.getElementById(
        "winnerBox"
    );

    if(winner){

        box.style.display = "block";

        box.innerHTML = `
            🏆 Winner:
            ${winner.Candidate}
            (${winner.Party})
            -
            ${winner.Votes} votes
        `;

    }


    /* TABLE */

    json.data.forEach(r => {

        let cls =
            r.Candidate === winner.Candidate
            ? "winner"
            : "";

        let alliance = getAlliance(
            r.Party
        );

        tbody.innerHTML += `

        <tr class="${cls}">

            <td>
                ${r.Candidate}
            </td>

            <td>
                ${r.Party}
            </td>

            <td class="count">
                ${r.Votes}
            </td>

            <td>
                ${r.Percent || 0}%
            </td>

            <td>
                ${alliance}
            </td>

        </tr>

        `;

    });


    /* ANIMATE COUNTS */

    document
    .querySelectorAll(".count")
    .forEach((el, i) => {

        animateValue(el, votes[i]);

    });


    /* BAR CHART */

    if(barChart){
        barChart.destroy();
    }

    barChart = new Chart(

        document.getElementById(
            "barChart"
        ),

        {
            type:"bar",

            data:{
                labels,

                datasets:[{
                    data:votes,
                    backgroundColor:colors
                }]
            },

            options:{

                responsive:true,

                animation:{
                    duration:1000
                },

                plugins:{

                    legend:{
                        display:false
                    },

                    datalabels:{
                        color:"#000",

                        formatter:(v) =>

                            (
                                (v / totalVotes) * 100
                            ).toFixed(1)

                            + "%"

                    }

                }

            },

            plugins:[ChartDataLabels]

        }

    );


    /* PIE CHART */

    if(pieChart){
        pieChart.destroy();
    }

    pieChart = new Chart(

        document.getElementById(
            "pieChart"
        ),

        {

            type:"pie",

            data:{

                labels:Object.keys(
                    allianceMap
                ),

                datasets:[{

                    data:Object.values(
                        allianceMap
                    ),

                    backgroundColor:[
                        "#1e90ff",
                        "#ff4b2b",
                        "#ff9800",
                        "#777"
                    ]

                }]

            }

        }

    );

}


/* DROPDOWN EVENT */

document
.getElementById("dropdown")
.addEventListener("change", e => {

    if(
        e.target.value !==
        "Select Constituency"
    ){

        loadData(
            e.target.value
        );

    }

});


loadDropdown();

</script>

</body>
</html>
