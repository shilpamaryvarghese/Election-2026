<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Wise Results</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Kerala Election 2026</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/constituency">Constituency</a>
        <a href="/partywise">Party Wise</a>
        <a href="/candidates">Candidates</a>
    </div>
</div>

<!-- BACKGROUND -->
<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- CONTAINER -->
<div class="container">
    <h1 class="page-title">🏛️ Party Wise Analysis</h1>
    <p class="subtitle">Alliance Wise Vote & Candidate Analysis</p>

    <!-- DROPDOWN -->
    <div class="search-area">
        <select id="partySelect" class="select-box" onchange="updateView()">
            <option value="">Select Alliance</option>
            <option value="UDF">UDF</option>
            <option value="LDF">LDF</option>
            <option value="NDA">NDA</option>
            <option value="Others">Others</option>
        </select>
    </div>

    <!-- PARTY CARDS -->
    <div id="cards" class="party-cards"></div>

    <!-- CHARTS -->
    <div class="grid-2">
        <!-- BAR -->
        <div class="chart-box">
            <h3>Alliance Candidates Votes</h3>
            <canvas id="barChart"></canvas>
        </div>

        <!-- PIE -->
        <div class="chart-box">
            <h3>Candidate Vote Distribution</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-box table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Constituency</th>
                    <th>Candidate</th>
                    <th>Party</th>
                    <th>Votes</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
    </div>
</div>

<script>
let fullData = [];
let barChart;
let pieChart;

/* ALLIANCE COLORS */
function getColor(alliance){
    alliance = (alliance || "").toUpperCase();
    if(alliance.includes("UDF")) return "#3b82f6";
    if(alliance.includes("LDF")) return "#ef4444";
    if(alliance.includes("NDA")) return "#f59e0b";
    return "#94a3b8";
}

/* LOAD DATA */
async function loadData(){
    try{
        let res = await fetch("/api/results");
        let json = await res.json();
        fullData = json.data || [];
        updateView();
    } catch(err){
        console.log(err);
    }
}

/* UPDATE */
function updateView(){
    let selected = document.getElementById("partySelect").value;
    if(!selected) return;

    let filtered;
    if(selected.toUpperCase() === "OTHERS") {
        filtered = fullData.filter(r => !["UDF","LDF","NDA"].includes((r.alliance || "").toUpperCase()));
    } else {
        filtered = fullData.filter(r => (r.alliance || "").toUpperCase() === selected.toUpperCase());
    }

    renderCards(filtered, selected);
    renderTable(filtered, selected);
    drawCharts(filtered, selected);
}

/* PARTY CARDS */
function renderCards(data, selected){
    let container = document.getElementById("cards");
    let totalVotes = 0;
    let wonLead = 0;

    data.forEach(r => {
        totalVotes += parseInt(r.votes || 0);
        if(r.status === "Won" || r.status === "Lead") wonLead++;
    });

    let color = getColor(selected);

    container.innerHTML = `
    <div class="highlight-card" style="border-top:6px solid ${color};">
        <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap:20px;">
            <div>
                <h2>${selected} Candidates</h2>
                <h1>${data.length}</h1>
            </div>
            <div>
                <h2>Leading/Won</h2>
                <h1 style="color:${color}">${wonLead}</h1>
            </div>
            <div>
                <h2>Total Votes</h2>
                <h1>${Number(totalVotes).toLocaleString()}</h1>
            </div>
        </div>
    </div>
    `;
}

/* TABLE */
function renderTable(data, selected){
    let tbody = document.getElementById("body");
    tbody.innerHTML = "";

    // Sort by votes descending
    let sortedData = [...data].sort((a,b) => parseInt(b.votes || 0) - parseInt(a.votes || 0));

    sortedData.forEach(r => {
        let rowClass = (r.status === "Won" || r.status === "Lead") ? "winner-row" : "";
        let statusBadge = r.status ? `<span style="background:rgba(34,197,94,0.2); color:#4ade80; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:700;">${r.status}</span>` : "";

        tbody.innerHTML += `
        <tr class="${rowClass}">
            <td>${r.constituency}</td>
            <td><strong>${r.candidate}</strong></td>
            <td>${r.party}</td>
            <td>${Number(r.votes || 0).toLocaleString()}</td>
            <td>${statusBadge}</td>
        </tr>
        `;
    });
}

/* CHARTS */
function drawCharts(data, selected){
    // Top 10 candidates by votes
    let topData = [...data].sort((a,b) => parseInt(b.votes || 0) - parseInt(a.votes || 0)).slice(0, 10);

    let labels = topData.map(r => r.candidate);
    let votes = topData.map(r => parseInt(r.votes || 0));
    let color = getColor(selected);
    let colors = topData.map(() => color);

    /* BAR */
    if(barChart) barChart.destroy();
    barChart = new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: selected + " Votes (Top 10)",
                data: votes,
                backgroundColor: colors,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: "#e2e8f0" } } },
            scales: {
                y: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(255,255,255,0.05)" } },
                x: { ticks: { color: "#94a3b8", maxRotation: 45, minRotation: 45 }, grid: { display: false } }
            }
        }
    });

    /* PIE */
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById("pieChart"), {
        type: "doughnut",
        data: {
            labels: labels,
            datasets: [{
                data: votes,
                backgroundColor: colors.map((c, i) => {
                    // Create varying opacity/lightness for the same color to distinguish slices
                    return i % 2 === 0 ? c : c.replace(')', ', 0.7)').replace('rgb', 'rgba');
                }),
                borderWidth: 0
            }]
        },
        options: {
            plugins: { legend: { position: "right", labels: { color: "#e2e8f0" } } },
            cutout: '70%'
        }
    });
}

loadData();
</script>

</body>
</html>
