<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Party Wise Results
</title>

<link
    rel="stylesheet"
    href="/static/style.css"
>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>
        Kerala Election 2026
    </h2>

    <div class="nav-links">

        <a href="/">
            Home
        </a>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/constituency">
            Constituency
        </a>

        <a href="/partywise">
            Party Wise
        </a>

        <a href="/candidates">
            Candidates
        </a>

    </div>

</div>


<!-- BACKGROUND -->

<div class="bg-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>


<!-- CONTAINER -->

<div class="container">

    <h1 class="page-title">
        🏛️ Party Wise Analysis
    </h1>

    <p class="subtitle">
        Alliance Wise Vote & Candidate Analysis
    </p>


    <!-- DROPDOWN -->

    <div class="search-area">

        <select
            id="partySelect"
            class="select-box"
            onchange="updateView()"
        >

            <option value="">
                Select Alliance
            </option>

            <option value="UDF">
                UDF
            </option>

            <option value="LDF">
                LDF
            </option>

            <option value="NDA">
                NDA
            </option>

            <option value="Others">
                Others
            </option>

        </select>

    </div>


    <!-- PARTY CARDS -->

    <div
        id="cards"
        class="party-cards"
    ></div>


    <!-- CHARTS -->

    <div class="grid-2">

        <!-- BAR -->

        <div class="chart-box">

            <h3>
                Alliance Vote Share
            </h3>

            <canvas id="barChart"></canvas>

        </div>


        <!-- PIE -->

        <div class="chart-box">

            <h3>
                Candidate Distribution
            </h3>

            <canvas id="pieChart"></canvas>

        </div>

    </div>


    <!-- TABLE -->

    <div class="table-box">

        <table>

            <thead>

                <tr>

                    <th>
                        Candidate
                    </th>

                    <th>
                        Party
                    </th>

                    <th>
                        Alliance
                    </th>

                    <th>
                        Votes
                    </th>

                </tr>

            </thead>

            <tbody id="body"></tbody>

        </table>

    </div>

</div>


<script>

let fullData = [];

let barChart;
let pieChart;


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/results"
        );

        let json = await res.json();

        fullData = json.data || [];

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* COLORS */

function getColor(alliance){

    alliance =
        (alliance || "")
        .toUpperCase();

    if(alliance.includes("UDF")){
        return "#2563eb";
    }

    if(alliance.includes("LDF")){
        return "#dc2626";
    }

    if(alliance.includes("NDA")){
        return "#f59e0b";
    }

    return "#64748b";

}


/* UPDATE */

function updateView(){

    let selected =

        document
        .getElementById(
            "partySelect"
        )
        .value;


    if(!selected){
        return;
    }


    let filtered =

        fullData.filter(r =>

            (
                r.alliance || ""
            )
            .toUpperCase()
            ===
            selected.toUpperCase()

        );


    renderCards(filtered,selected);

    renderTable(filtered);

    drawCharts(filtered,selected);

}


/* PARTY CARDS */

function renderCards(data,selected){

    let container =
        document.getElementById(
            "cards"
        );

    container.innerHTML = "";


    let totalVotes = 0;

    data.forEach(r => {

        totalVotes += parseInt(
            r.votes || 0
        );

    });


    let color =
        getColor(selected);


    container.innerHTML = `

    <div
        class="party-card highlight-card"
        style="
            border-top:6px solid ${color};
        "
    >

        <h2>

            ${selected}

        </h2>

        <h1>

            ${data.length}

        </h1>

        <p>
            Candidates
        </p>

        <br>

        <h2>

            ${Number(
                totalVotes
            ).toLocaleString()}

        </h2>

        <p>
            Total Votes
        </p>

    </div>

    `;

}


/* TABLE */

function renderTable(data){

    let tbody =
        document.getElementById(
            "body"
        );

    tbody.innerHTML = "";


    data.forEach(r => {

        let color =
            getColor(
                r.alliance
            );


        tbody.innerHTML += `

        <tr>

            <td>

                <strong>

                    ${r.name}

                </strong>

            </td>

            <td>

                ${r.party}

            </td>

            <td>

                <span
                    style="
                        color:${color};
                        font-weight:700;
                    "
                >

                    ${r.alliance}

                </span>

            </td>

            <td>

                ${Number(
                    r.votes || 0
                ).toLocaleString()}

            </td>

        </tr>

        `;

    });

}


/* CHARTS */

function drawCharts(data,selected){

    let labels =
        data.map(
            r => r.name
        );

    let votes =
        data.map(
            r => parseInt(
                r.votes || 0
            )
        );

    let colors =
        data.map(
            () => getColor(selected)
        );


    /* BAR */

    if(barChart){
        barChart.destroy();
    }

    barChart = new Chart(

        document.getElementById(
            "barChart"
        ),

        {

            type:"bar",

            data:{

                labels:labels,

                datasets:[{

                    label:selected,

                    data:votes,

                    backgroundColor:colors,

                    borderRadius:12

                }]

            },

            options:{

                responsive:true,

                plugins:{

                    legend:{
                        labels:{
                            color:"white"
                        }
                    }

                },

                scales:{

                    y:{
                        ticks:{
                            color:"white"
                        }
                    },

                    x:{
                        ticks:{
                            color:"white"
                        }
                    }

                }

            }

        }

    );


    /* PIE */

    if(pieChart){
        pieChart.destroy();
    }

    pieChart = new Chart(

        document.getElementById(
            "pieChart"
        ),

        {

            type:"pie",

            data:{

                labels:labels,

                datasets:[{

                    data:votes,

                    backgroundColor:colors

                }]

            },

            options:{

                plugins:{

                    legend:{
                        labels:{
                            color:"white"
                        }
                    }

                }

            }

        }

    );

}

</script>

</body>
</html>
