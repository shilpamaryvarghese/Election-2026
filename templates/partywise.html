<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Party Wise Results</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>Kerala Election 2026</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/constituency">Constituency</a>
        <a href="/partywise">Party Wise</a>
        <a href="/candidates">Candidates</a>
    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <h2 class="page-title">
        Party Wise Analysis
    </h2>

    <!-- SELECT -->

    <select
        id="partySelect"
        class="select-box"
        onchange="updateView()"
    >

        <option value="">
            Select Party
        </option>

    </select>

    <!-- CARDS -->

    <div
        id="cards"
        class="party-cards"
    ></div>

    <!-- BAR CHART -->

    <div class="chart-box">

        <canvas id="barChart"></canvas>

    </div>

    <!-- PIE CHART -->

    <div class="chart-box">

        <canvas id="pieChart"></canvas>

    </div>

</div>

<script>

let data = [];

let barChart;
let pieChart;


/* PARTY COLORS */

function getColor(party){

    party = (party || "").toUpperCase();

    if(
        party.includes("INC")
    ){
        return "#1e90ff";
    }

    if(
        party.includes("CPM")
        ||
        party.includes("CPI")
    ){
        return "#ff4b2b";
    }

    if(
        party.includes("BJP")
    ){
        return "#f7971e";
    }

    return "#888";

}


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/partywise"
        );

        let json = await res.json();

        data = json.data || [];

        populateDropdown();

        renderCards();

        drawCharts();

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* DROPDOWN */

function populateDropdown(){

    let select = document.getElementById(
        "partySelect"
    );

    select.innerHTML = `
        <option value="">
            Select Party
        </option>
    `;

    data.forEach(p => {

        let opt = `

        <option value="${p.Party}">

            ${p.Party}

        </option>

        `;

        select.innerHTML += opt;

    });

}


/* PARTY CARDS */

function renderCards(selected = ""){

    let container = document.getElementById(
        "cards"
    );

    container.innerHTML = "";

    data.forEach(p => {

        let cls = "";

        if(selected){

            cls =
                (p.Party === selected)
                ?
                "highlight"
                :
                "dim";

        }

        let color = getColor(
            p.Party
        );

        container.innerHTML += `

        <div
            class="party-card ${cls}"
            style="
                border-top:5px solid ${color}
            "
        >

            <h3>
                ${p.Party}
            </h3>

            <p>
                Seats:
                ${p.Seats}
            </p>

            <p>
                Votes:
                ${Number(
                    p.Votes
                ).toLocaleString()}
            </p>

        </div>

        `;

    });

}


/* DRAW CHARTS */

function drawCharts(selected = ""){

    let labels = data.map(
        p => p.Party
    );

    let votes = data.map(
        p => p.Votes
    );

    let colors = data.map(p => {

        if(
            selected
            &&
            p.Party !== selected
        ){
            return "rgba(200,200,200,0.3)";
        }

        return getColor(
            p.Party
        );

    });


    /* BAR */

    if(barChart){
        barChart.destroy();
    }

    barChart = new Chart(

        document.getElementById(
            "barChart"
        ),

        {

            type:"bar",

            data:{

                labels:labels,

                datasets:[{

                    label:"Votes",

                    data:votes,

                    backgroundColor:colors

                }]

            },

            options:{

                responsive:true,

                plugins:{

                    legend:{
                        display:false
                    }

                }

            }

        }

    );


    /* PIE */

    if(pieChart){
        pieChart.destroy();
    }

    pieChart = new Chart(

        document.getElementById(
            "pieChart"
        ),

        {

            type:"pie",

            data:{

                labels:labels,

                datasets:[{

                    data:votes,

                    backgroundColor:colors

                }]

            }

        }

    );

}


/* UPDATE VIEW */

function updateView(){

    let selected = document
        .getElementById(
            "partySelect"
        )
        .value;

    renderCards(selected);

    drawCharts(selected);

}

</script>

</body>
</html>
