<!DOCTYPE html>
<html>
<head>
    <title>Party Wise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
    <h1>Party Wise Results</h1>
</div>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/candidates">Candidates</a>
    <a href="/partywise">Party Wise</a>
</div>

<div class="container">

<table>
<thead>
<tr>
<th>Party</th>
<th>Total Candidates</th>
<th>Won</th>
<th>Leading</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>
async function load(){
    let res = await fetch("/api/partywise");
    let json = await res.json();

    let tbody = document.getElementById("data");
    tbody.innerHTML = "";

    json.data.forEach(r=>{
        tbody.innerHTML += `
        <tr>
        <td>${r.Party}</td>
        <td>${r.Candidates}</td>
        <td>${r.Won}</td>
        <td>${r.Leading}</td>
        </tr>`;
    });
}

setInterval(load, 10000);
load();
</script>

</body>
</html>
