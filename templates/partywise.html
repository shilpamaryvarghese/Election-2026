<!DOCTYPE html>
<html>
<head>
<title>Party Wise</title>
</head>

<body>

<h2>Party Wise</h2>

<table border="1">
<tr><th>Party</th><th>Seats</th><th>Votes</th></tr>
<tbody id="table"></tbody>
</table>

<script>
async function load(){
    let res = await fetch("/api/partywise");
    let json = await res.json();

    let t = document.getElementById("table");

    json.data.forEach(d=>{
        t.innerHTML += `<tr>
        <td>${d.party}</td>
        <td>${d.Seats}</td>
        <td>${d.Votes}</td>
        </tr>`;
    });
}

load();
</script>

</body>
</html>
