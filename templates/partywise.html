<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Party Wise Results
</title>

<link
    rel="stylesheet"
    href="/static/style.css"
>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <h2>
        Kerala Election 2026
    </h2>

    <div class="nav-links">

        <a href="/">
            Home
        </a>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/constituency">
            Constituency
        </a>

        <a href="/partywise">
            Party Wise
        </a>

        <a href="/candidates">
            Candidates
        </a>

    </div>

</div>


<!-- CONTAINER -->

<div class="container">

    <h2 class="page-title">
        Party Wise Analysis
    </h2>


    <!-- DROPDOWN -->

    <select
        id="partySelect"
        class="select-box"
        onchange="updateView()"
    >

        <option value="">
            All Alliances
        </option>

        <option value="UDF">
            UDF
        </option>

        <option value="LDF">
            LDF
        </option>

        <option value="NDA">
            NDA
        </option>

        <option value="Others">
            Others
        </option>

    </select>


    <!-- CARDS -->

    <div
        id="cards"
        class="party-cards"
    ></div>


    <!-- BAR CHART -->

    <div class="chart-box">

        <canvas id="barChart"></canvas>

    </div>


    <!-- PIE CHART -->

    <div class="chart-box">

        <canvas id="pieChart"></canvas>

    </div>

</div>


<script>

let fullData = [];

let barChart;
let pieChart;


/* ALLIANCE DETECTION */

function getAlliance(p){

    p = (p || "").toUpperCase();

    if(
        ["INC","IUML","RSP"]
        .some(x => p.includes(x))
    ){
        return "UDF";
    }

    if(
        ["CPM","CPI"]
        .some(x => p.includes(x))
    ){
        return "LDF";
    }

    if(
        ["BJP","BDJS"]
        .some(x => p.includes(x))
    ){
        return "NDA";
    }

    return "Others";

}


/* COLORS */

function getColor(alliance){

    if(alliance === "UDF"){
        return "#2563eb";
    }

    if(alliance === "LDF"){
        return "#dc2626";
    }

    if(alliance === "NDA"){
        return "#f59e0b";
    }

    return "#64748b";

}


/* LOAD DATA */

async function loadData(){

    try{

        let res = await fetch(
            "/api/results"
        );

        let json = await res.json();

        fullData = json.data || [];

        updateView();

    }

    catch(err){

        console.log(err);

    }

}

loadData();


/* UPDATE PAGE */

function updateView(){

    let selectedAlliance =
        document
        .getElementById(
            "partySelect"
        )
        .value;

    let grouped = {};


    /* GROUP DATA */

    fullData.forEach(r => {

        let alliance =
            getAlliance(
                r.Party
            );

        if(
            selectedAlliance
            &&
            alliance !== selectedAlliance
        ){
            return;
        }

        if(!grouped[alliance]){

            grouped[alliance] = {

                alliance:alliance,

                seats:0,

                votes:0

            };

        }

        grouped[alliance].votes +=
            parseInt(
                r.Votes || 0
            );

        let status =
            (
                r.Status || ""
            ).toLowerCase();

        if(
            status.includes("won")
            ||
            status.includes("lead")
        ){

            grouped[alliance].seats++;

        }

    });


    /* CONVERT */

    let data =
        Object.values(grouped);


    /* CARDS */

    renderCards(data);


    /* CHARTS */

    drawCharts(data);

}


/* CARDS */

function renderCards(data){

    let container =
        document.getElementById(
            "cards"
        );

    container.innerHTML = "";


    data.forEach(d => {

        let color =
            getColor(
                d.alliance
            );

        container.innerHTML += `

        <div
            class="party-card"
            style="
                border-top:5px solid ${color}
            "
        >

            <h2>
                ${d.alliance}
            </h2>

            <h1>
                ${d.seats}
            </h1>

            <p>
                Seats
            </p>

            <br>

            <h3>
                ${Number(
                    d.votes
                ).toLocaleString()}
            </h3>

            <p>
                Votes
            </p>

        </div>

        `;

    });

}


/* DRAW CHARTS */

function drawCharts(data){

    let labels =
        data.map(
            d => d.alliance
        );

    let votes =
        data.map(
            d => d.votes
        );

    let colors =
        data.map(
            d => getColor(
                d.alliance
            )
        );


    /* BAR */

    if(barChart){
        barChart.destroy();
    }

    barChart = new Chart(

        document.getElementById(
            "barChart"
        ),

        {

            type:"bar",

            data:{

                labels:labels,

                datasets:[{

                    label:"Votes",

                    data:votes,

                    backgroundColor:colors,

                    borderRadius:12

                }]

            },

            options:{

                responsive:true,

                plugins:{

                    legend:{
                        labels:{
                            color:"white"
                        }
                    }

                },

                scales:{

                    y:{
                        ticks:{
                            color:"white"
                        }
                    },

                    x:{
                        ticks:{
                            color:"white"
                        }
                    }

                }

            }

        }

    );


    /* PIE */

    if(pieChart){
        pieChart.destroy();
    }

    pieChart = new Chart(

        document.getElementById(
            "pieChart"
        ),

        {

            type:"pie",

            data:{

                labels:labels,

                datasets:[{

                    data:votes,

                    backgroundColor:colors

                }]

            },

            options:{

                plugins:{

                    legend:{
                        labels:{
                            color:"white"
                        }
                    }

                }

            }

        }

    );

}

</script>

</body>
</html>
